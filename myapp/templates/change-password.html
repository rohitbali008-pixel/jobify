{% extends "user_profile_base.html" %}
{% load static %}

{% block page_title %}Change Password{% endblock %}

 

{% block section %}
              <div class="job-alerts-item">
                <h3 class="alerts-title">Change Password</h3>
                {% if messages %}
                <div class="mb-3">
                  {% for message in messages %}
                  <div class="alert alert-{{ message.tags }} mb-2" role="alert">{{ message }}</div>
                  {% endfor %}
                </div>
                {% endif %}
                <form class="form" method="post" action="{% url 'change_password' %}">
                  {% csrf_token %}
                  <div class="form-group is-empty">
                    <label class="control-label">Old Password*</label>
                    <input class="form-control" type="password" name="current_password" required>
                    <span class="material-input"></span>
                  </div>
                  <div class="form-group is-empty">
                    <label class="control-label">New Password*</label>
                    <input class="form-control" type="password" name="new_password" required>
                    <span class="material-input"></span>
                  </div>
                  <div class="form-group is-empty">
                    <label class="control-label">Confirm New Password*</label>
                    <input class="form-control" type="password" name="confirm_password" required>
                    <span class="material-input"></span>
                  </div>
                  <button type="submit" class="btn btn-common" id="submit">Save Change</button>
                </form>
              </div>
            </div>
          </div>
        </div>      
      </div>
      <!-- End Content -->
{% endblock %}
