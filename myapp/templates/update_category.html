{% extends "dashboard.html" %}

{% block content %}
<div class="container py-4">
  <h3 class="mb-3">Update Test Category</h3>
  <form method="post" class="row g-3">
    {% csrf_token %}
    <div class="col-md-6">
      <label class="form-label">Test / Job Profile Name</label>
      <input type="text" class="form-control" name="name" value="{{ category.name }}" required />
    </div>
    <div class="col-12">
      <a class="btn btn-secondary" href="{% url 'create_test' %}">Back</a>
      <button type="submit" class="btn btn-primary">Update Test Category</button>
    </div>
  </form>
</div>
{% endblock %}
