{% extends 'base.html' %}
{% load static %}

{% block content %}
  <!-- Page Header Start -->
  <div class="page-header">
    <div class="container">
      <div class="row">
        <div class="col-lg-12">
          <div class="inner-header">
            <h3>Create Your account</h3>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- Page Header End -->

  <!-- Content section Start -->
  <section id="content" class="section-padding">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-5 col-md-6 col-xs-12">
        <div class="page-login-form box">
          <h3>Create Your account</h3>
          <form class="login-form" method="post" action="{% url 'register' %}">
              {% csrf_token %}
              <div class="form-group">
                <div class="input-icon">
                  <i class="lni-user"></i>
                  <input type="text" class="form-control" name="fullname" placeholder="Full Name" required />
                </div>
              </div>
              <div class="form-group">
                <div class="input-icon">
                  <i class="lni-envelope"></i>
                  <input type="email" class="form-control" name="email" placeholder="Email Address" required />
                </div>
              </div>
              <div class="form-group">
                <div class="input-icon">
                  <i class="lni-phone-handset"></i>
                  <input type="number" class="form-control" name="mobileno" placeholder="Mobile Number" required />
                </div>
              </div>
              <div class="form-group">
                <div class="input-icon">
                  <i class="lni-calendar"></i>
                  <input type="date" class="form-control" name="dateofbirth" placeholder="Date of Birth (YYYYMMDD)" required />
                </div>
              </div>
              <div class="form-group">
                <div class="input-icon">
                  <i class="lni-map-marker"></i>
                  <input type="text" class="form-control" name="address" placeholder="Address" required />
                </div>
              </div>
              <div class="form-group">
                <div class="input-icon">
                  <i class="lni-lock"></i>
                  <input type="password" class="form-control" name="password" placeholder="Password" required />
                </div>
              </div>
              <div class="form-group">
                <div class="input-icon">
                  <i class="lni-unlock"></i>
                  <input type="password" class="form-control" name="confirm_password" placeholder="Retype Password" required />
                </div>
              </div>
              <button type="submit" class="btn btn-common log-btn mt-3">Register</button>
              <p class="text-center">
                Already have an account? <a href="{% url 'login' %}">Sign In</a>
              </p>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>
  <!-- Content section End -->
{% endblock %}
