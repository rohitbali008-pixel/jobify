{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
      body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }
      
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: 260px;
        height: 100vh;
        background: #212529;
        padding: 20px;
        overflow-y: auto;
      }
      
      .sidebar h4 {
        color: white;
        margin-bottom: 30px;
      }
      
      .sidebar a {
        width: 100%;
        margin-bottom: 15px;
      }
      
      .main-content {
        margin-left: 260px;
        padding: 20px;
        min-height: 100vh;
        background: #f8f9fa;
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h4>Dashboard</h4>

      <a class="btn btn-primary" href="{% url 'employee_profile' %}">Profile</a>

      <a class="btn btn-primary" href="{% url 'vacancy' %}">Vacancy</a>

      <a class="btn btn-primary" href="{% url 'add_employee' %}">Add Employee</a>

      <a class="btn btn-primary" href="{% url 'add_employee' %}">View Application</a>

      <a class="btn btn-primary" href="{% url 'add_employee' %}">Shortlisted List</a>

      <a class="btn btn-primary" href="{% url 'add_employee' %}">Scheduled Interview</a>
    </div>

    <div class="main-content">
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">Navbar</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{% url 'vacancy' %}">vacancy</a>
              </li>
              <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">User data</a>
                <ul class="dropdown-menu">
                  <li>
                    <a class="dropdown-item" href="{% url 'user_profile' %}">profile</a>
                  </li>
                  <li>
                    <a class="dropdown-item" href="{% url 'register' %}">register</a>
                  </li>
                </ul>
              </li>

              <li class="nav-item">
                <a class="nav-link" href="{% url 'login' %}">login</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{% url 'logout' %}">logout</a>
              </li>
            </ul>
            <form class="d-flex" role="search">
              <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
              <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
          </div>
        </div>
      </nav>
      {% block content %}

      {% endblock %}
    </div>
  </body>
</html>
