{% extends "user_profile_base.html" %}
{% load static %}

{% block page_title %}My Profile{% endblock %}

{% block section %}
              

                <form class="form" method="post" action="{% url 'resume' %}" enctype="multipart/form-data">
                  {% csrf_token %}

                  
                  <div class="row">
                    <div class="col-md-6">
                      <div class="form-group is-empty">
                        <label class="control-label">Full Name*</label>
                        <input class="form-control" type="text" name="fullname" value="{{ user_profile.fullname }}" required>
                        <span class="material-input"></span>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <div class="form-group is-empty">
                        <label class="control-label">Email*</label>
                        <input class="form-control" type="email" name="email" value="{{ user_profile.email }}" required>
                        <span class="material-input"></span>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <div class="form-group is-empty">
                        <label class="control-label">Mobile Number*</label>
                        <input class="form-control" type="number" name="mobileno" value="{{ user_profile.mobileno }}" required>
                        <span class="material-input"></span>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <div class="form-group is-empty">
                        <label class="control-label">Date of Birth*</label>
                        <input class="form-control" type="date" name="dateofbirth" value="{{ user_profile.dateofbirth|date:'Y-m-d' }}" required>
                        <span class="material-input"></span>
                      </div>
                    </div>
                  </div>

                  <div class="form-group is-empty">
                    <label class="control-label">Address*</label>
                    <textarea class="form-control" name="address" rows="4" required>{{ user_profile.address }}</textarea>
                    <span class="material-input"></span>
                  </div>

                
                  <div class="row">
                    <div class="col-md-6">
                      <div class="form-group is-empty">
                        <label class="control-label">Gender</label>
                        <select class="form-control" name="gender">
                          <option value="male" {% if profile.gender == "male" %}selected{% endif %}>Male</option>
                          <option value="female" {% if profile.gender == "female" %}selected{% endif %}>Female</option>
                          <option value="other" {% if profile.gender == "other" %}selected{% endif %}>Other</option>
                        </select>
                        <span class="material-input"></span>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <div class="form-group is-empty">
                        <label class="control-label">Experience</label>
                        <select class="form-control" name="experience" required>
                          {% for value, label in experience_choices %}
                            <option value="{{ value }}" {% if profile.experience == value %}selected{% endif %}>{{ label }}</option>
                          {% endfor %}
                        </select>
                        <span class="material-input"></span>
                      </div>
                    </div>
                  </div>

                  <div class="form-group is-empty">
                    <label class="control-label">Education</label>
                    <input class="form-control" type="text" name="education" value="{{ profile.education|default:'' }}">
                    <span class="material-input"></span>
                  </div>

                  <div class="row">
                    <div class="col-md-6">
                      <div class="form-group is-empty">
                        <label class="control-label">Profile Picture</label>
                        <input class="form-control" type="file" name="profile_pic" accept="image/*">
                        {% if profile.profile_pic %}
                          <small class="form-text text-muted">Current: <a href="{{ profile.profile_pic.url }}" target="_blank">{{ profile.profile_pic }}</a></small>
                        {% endif %}
                        <span class="material-input"></span>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <div class="form-group is-empty">
                        <label class="control-label">Resume</label>
                        <input class="form-control" type="file" name="resume" accept=".pdf,.doc,.docx,.txt,.rtf">
                        {% if profile.resume %}
                          <small class="form-text text-muted">Current: <a href="{{ profile.resume.url }}" target="_blank">{{ profile.resume }}</a></small>
                        {% endif %}
                        <span class="material-input"></span>
                      </div>
                    </div>
                  </div>

                  <button type="submit" class="btn btn-common" id="submit">Save Profile</button>
                </form>
              </div>
{% endblock %}
