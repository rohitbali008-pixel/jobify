{% extends "dashboard.html" %}

{% block content %}
<div class="container py-4">
  <h3 class="mb-3">Scheduled Interview</h3>
  <form method="post" class="row g-3">
    {% csrf_token %}
    <div class="col-md-6">
      <label class="form-label">Application</label>
      <select name="application_id" class="form-select" required>
        <option value="" disabled selected>Select shortlisted applicant</option>
        {% for application in applications %}
          <option value="{{ application.id }}">{{ application.user_id.fullname|default:"Unknown" }} - {{ application.job_id.title }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-3">
      <label class="form-label">Interview Date</label>
      <input type="date" class="form-control" name="interview_date" required />
    </div>
    <div class="col-md-3">
      <label class="form-label">Interview Time</label>
      <input type="time" class="form-control" name="interview_time" required />
    </div>
    <div class="col-12">
      <label class="form-label">Meeting Link or Address</label>
      <input type="text" class="form-control" name="meeting_place" required />
    </div>
    <div class="col-12">
      <button type="submit" class="btn btn-primary">Schedule Interview</button>
    </div>
  </form>
</div>
{% endblock %}
