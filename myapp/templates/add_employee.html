{% extends "dashboard.html" %}

{% block content %}
<div class="container py-4">
  <h3 class="mb-3">Add Employee</h3>
  <div class="alert alert-secondary">
    Company: <strong>{{ company.name }}</strong>
  </div>
  <form method="post" enctype="multipart/form-data" class="row g-3">
    {% csrf_token %}
    <div class="col-md-6">
      <label class="form-label">Full Name</label>
      <input type="text" class="form-control" name="fullname" required />
    </div>
    <div class="col-md-6">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" name="email" required />
    </div>
    <div class="col-md-6">
      <label class="form-label">Password</label>
      <input type="text" class="form-control" name="password" required />
    </div>
    <div class="col-md-6">
      <label class="form-label">Phone</label>
      <input type="text" class="form-control" name="phone" />
    </div>
    <div class="col-md-6">
      <label class="form-label">Designation</label>
      <select name="designation" class="form-select" required>
        <option value="" disabled selected>Select designation</option>
        {% for value, label in designation_choices %}
          <option value="{{ value }}">{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-6">
      <label class="form-label">Role</label>
      <select name="role" class="form-select">
        {% for value, label in role_choices %}
          <option value="{{ value }}">{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-6">
      <label class="form-label">Salary</label>
      <input type="number" class="form-control" name="sallary" required />
    </div>
    <div class="col-md-6">
      <label class="form-label">Date of Joining</label>
      <input type="date" class="form-control" name="dateofjoining" required />
    </div>
    <div class="col-md-6">
      <label class="form-label">Profile Picture</label>
      <input type="file" class="form-control" name="profile_pic" />
    </div>
    <div class="col-12">
      <button type="submit" class="btn btn-primary">Add Employee</button>
    </div>
  </form>
</div>
{% endblock %}
